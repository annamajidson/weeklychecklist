<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workweek</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --border: #2e2d28;
    --border2: #3a3930;
    --text: #e8e4d8;
    --muted: #7a7768;
    --teal:   #4ecba3;
    --purple: #a78bfa;
    --blue:   #60a5fa;
    --amber:  #f59e0b;
    --coral:  #f97316;
    --gray:   #6b7280;
    --teal-bg:   rgba(78,203,163,0.08);
    --purple-bg: rgba(167,139,250,0.08);
    --blue-bg:   rgba(96,165,250,0.08);
    --amber-bg:  rgba(245,158,11,0.08);
    --coral-bg:  rgba(249,115,22,0.08);
    --gray-bg:   rgba(107,114,128,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 0 0 80px;
  }
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  h1 { font-family: 'DM Serif Display', serif; font-size: 42px; font-weight: 400; line-height: 1; letter-spacing: -0.5px; }
  h1 em { font-style: italic; color: var(--teal); }
  .header-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .week-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .progress-bar-wrap { width: 180px; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 11px; color: var(--muted); }

  .save-status { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; min-height: 16px; transition: opacity 0.3s; }
  .save-status.saving { color: var(--amber); }
  .save-status.saved  { color: var(--teal); }

  .day-tabs {
    display: flex; padding: 0 40px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    padding: 16px 20px 14px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase;
    border-bottom: 2px solid transparent; white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    display: flex; align-items: center; gap: 8px; user-select: none;
    background: none; border-top: none; border-left: none; border-right: none; outline: none;
  }
  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--text); border-bottom-color: var(--teal); }
  .day-tab .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: background 0.2s; }
  .day-tab.complete .day-dot { background: var(--teal); }
  .day-tab.partial  .day-dot { background: var(--amber); }

  .day-view { display: none; padding: 32px 40px; }
  .day-view.active { display: block; }
  .day-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
  .day-name { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 400; }
  .day-progress { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .reset-day {
    margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px;
    cursor: pointer; letter-spacing: 0.05em; transition: color 0.15s, border-color 0.15s;
  }
  .reset-day:hover { color: var(--text); border-color: var(--border2); }

  .blocks { display: flex; flex-direction: column; gap: 6px; }
  .block {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 8px; border: 1px solid transparent;
    cursor: pointer; transition: opacity 0.2s; user-select: none;
  }
  .block:hover { filter: brightness(1.1); }
  .block.done { opacity: 0.4; }
  .block-check {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .block.done .block-check::after {
    content: ''; width: 8px; height: 5px;
    border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg);
    transform: rotate(-45deg) translateY(-1px); display: block;
  }
  .block-time  { font-size: 11px; color: var(--muted); min-width: 110px; letter-spacing: 0.03em; }
  .block-label { flex: 1; font-size: 13px; }
  .block-tag   { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; opacity: 0.7; }

  .block.teal   { background: var(--teal-bg);  border-color: rgba(78,203,163,0.15); }
  .block.purple { background: var(--purple-bg); border-color: rgba(167,139,250,0.15); }
  .block.blue   { background: var(--blue-bg);   border-color: rgba(96,165,250,0.15); }
  .block.amber  { background: var(--amber-bg);  border-color: rgba(245,158,11,0.15); }
  .block.coral  { background: var(--coral-bg);  border-color: rgba(249,115,22,0.15); }
  .block.gray   { background: var(--gray-bg);   border-color: rgba(107,114,128,0.1); }

  .block.teal   .block-check { border-color: var(--teal); }
  .block.purple .block-check { border-color: var(--purple); }
  .block.blue   .block-check { border-color: var(--blue); }
  .block.amber  .block-check { border-color: var(--amber); }
  .block.coral  .block-check { border-color: var(--coral); }
  .block.gray   .block-check { border-color: var(--gray); }

  .block.teal.done   .block-check { background: var(--teal); }
  .block.purple.done .block-check { background: var(--purple); }
  .block.blue.done   .block-check { background: var(--blue); }
  .block.amber.done  .block-check { background: var(--amber); }
  .block.coral.done  .block-check { background: var(--coral); }
  .block.gray.done   .block-check { background: var(--gray); }

  .block.teal   .block-tag { background: rgba(78,203,163,0.12);  color: var(--teal); }
  .block.purple .block-tag { background: rgba(167,139,250,0.12); color: var(--purple); }
  .block.blue   .block-tag { background: rgba(96,165,250,0.12);  color: var(--blue); }
  .block.amber  .block-tag { background: rgba(245,158,11,0.12);  color: var(--amber); }
  .block.coral  .block-tag { background: rgba(249,115,22,0.12);  color: var(--coral); }
  .block.gray   .block-tag { background: rgba(107,114,128,0.1);  color: var(--gray); }

  .done-banner {
    display: none; margin-top: 24px; padding: 16px 20px; border-radius: 8px;
    border: 1px solid rgba(78,203,163,0.3); background: rgba(78,203,163,0.06);
    color: var(--teal); font-size: 13px; letter-spacing: 0.04em; text-align: center;
  }
  .done-banner.visible { display: block; }

  .loading { padding: 60px 40px; color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }

  @media (max-width: 600px) {
    header { padding: 32px 20px 24px; }
    h1 { font-size: 30px; }
    .day-tabs, .day-view { padding-left: 20px; padding-right: 20px; }
    .block-time { min-width: 80px; }
  }
</style>
</head>
<body>

<header>
  <h1>Work<em>week</em></h1>
  <div class="header-meta">
    <span class="week-label">Weekly progress</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="total-bar" style="width:0%"></div>
    </div>
    <span class="progress-label" id="total-label">0 / 0 blocks</span>
    <span class="save-status" id="save-status"></span>
  </div>
</header>

<nav class="day-tabs" id="day-tabs"></nav>
<main id="main"><div class="loading">Loading your schedule...</div></main>

<script>
const ALL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

function makeBlocks(day) {
  const coding   = ['Monday','Wednesday','Thursday'].includes(day);
  const flexLode = ['Monday','Wednesday','Friday'].includes(day);
  const adminEnd  = coding ? '5:00 – 5:30' : '4:30 – 5:00';
  const prac2Time = coding ? '5:30 – 6:00' : '5:00 – 5:30';
  const evenTime  = coding ? '6:00 – 8:30' : '5:30 – 8:30';

  return [
    { id:'journal',   time:'7:00 – 8:00',   label:'Morning pages / journaling',       color:'teal',   tag:'ritual' },
    { id:'workout',   time:'8:00 – 9:00',   label:'Morning workout',                  color:'teal',   tag:'ritual' },
    { id:'shower',    time:'9:00 – 9:30',   label:'Breakfast + shower',               color:'teal',   tag:'ritual' },
    { id:'practice1', time:'9:30 – 10:00',  label:'Instrument practice — block 1',    color:'purple', tag:'practice' },
    { id:'lode',      time:'10:00 – 12:30', label:'Deep composing — Lode',            color:'blue',   tag:'composing' },
    { id:'lunch',     time:'12:30 – 1:30',  label:'Lunch break',                      color:'gray',   tag:'break' },
    { id:'jazz',      time:'1:30 – 2:30',   label:'Deep composing — The jazz album',  color:'blue',   tag:'composing' },
    { id:'flex',      time:'2:30 – 4:00',   label: flexLode
        ? 'Deep composing — Lode (flex)'
        : 'Deep composing — Jazz album (flex)',                                         color:'blue',   tag:'composing' },
    ...(coding ? [{ id:'coding', time:'4:00 – 5:00', label:'Coding project',          color:'coral',  tag:'coding' }] : []),
    { id:'admin2',    time: adminEnd,        label:'Admin / email check-in',           color:'amber',  tag:'admin' },
    { id:'practice2', time: prac2Time,       label:'Instrument practice — block 2',    color:'purple', tag:'practice' },
    { id:'evening',   time: evenTime,        label:'Evening — personal time',          color:'gray',   tag:'break' },
    { id:'winddown',  time:'8:30 – 10:00',  label:'Wind down',                        color:'gray',   tag:'break' },
  ];
}

// ── Storage ──────────────────────────────────────────────────────────────────
// Uses window.storage (Claude artifact persistent API) with an in-memory
// fallback so the app always works even if storage is unavailable.

const STORE_KEY = 'routine_v4';
let state = {};
let storageAvailable = false;

async function loadState() {
  try {
    const result = await window.storage.get(STORE_KEY);
    if (result && result.value) {
      state = JSON.parse(result.value);
    }
    storageAvailable = true;
  } catch (e) {
    // storage not available — run in-memory only
    storageAvailable = false;
  }
}

let saveTimer = null;
function schedulesSave() {
  clearTimeout(saveTimer);
  showStatus('saving');
  saveTimer = setTimeout(async () => {
    if (!storageAvailable) { showStatus(''); return; }
    try {
      await window.storage.set(STORE_KEY, JSON.stringify(state));
      showStatus('saved');
      setTimeout(() => showStatus(''), 2000);
    } catch(e) {
      showStatus('');
    }
  }, 400);
}

function showStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.className = 'save-status' + (s ? ' ' + s : '');
  el.textContent = s === 'saving' ? 'saving...' : s === 'saved' ? '✓ saved' : '';
}

// ── State helpers ─────────────────────────────────────────────────────────────
function key(day, id) { return `${day}__${id}`; }
function isChecked(day, id) { return !!state[key(day, id)]; }

function toggleBlock(day, id) {
  state[key(day, id)] = !state[key(day, id)];
  schedulesSave();
  render();
}

function resetDay(day) {
  makeBlocks(day).forEach(b => delete state[key(day, b.id)]);
  schedulesSave();
  render();
}

// ── UI ────────────────────────────────────────────────────────────────────────
let activeDay = ALL_DAYS[0];
function setDay(day) { activeDay = day; render(); }

function render() {
  document.getElementById('day-tabs').innerHTML = ALL_DAYS.map(day => {
    const blocks = makeBlocks(day);
    const done = blocks.filter(b => isChecked(day, b.id)).length;
    const cls = done === blocks.length ? 'complete' : done > 0 ? 'partial' : '';
    return `<button class="day-tab ${cls} ${day === activeDay ? 'active' : ''}" onclick="setDay('${day}')">
      <span class="day-dot"></span>${day.slice(0,3)}
    </button>`;
  }).join('');

  document.getElementById('main').innerHTML = ALL_DAYS.map(day => {
    const blocks = makeBlocks(day);
    const done = blocks.filter(b => isChecked(day, b.id)).length;
    const allDone = done === blocks.length;
    return `<div class="day-view ${day === activeDay ? 'active' : ''}">
      <div class="day-header">
        <span class="day-name">${day}</span>
        <span class="day-progress">${done} / ${blocks.length} complete</span>
        <button class="reset-day" onclick="resetDay('${day}')">reset</button>
      </div>
      <div class="blocks">
        ${blocks.map(b => `
          <div class="block ${b.color} ${isChecked(day, b.id) ? 'done' : ''}"
               onclick="toggleBlock('${day}','${b.id}')">
            <div class="block-check"></div>
            <span class="block-time">${b.time}</span>
            <span class="block-label">${b.label}</span>
            <span class="block-tag">${b.tag}</span>
          </div>`).join('')}
      </div>
      <div class="done-banner ${allDone ? 'visible' : ''}">✦ &nbsp; ${day} complete — good work.</div>
    </div>`;
  }).join('');

  let totalDone = 0, totalAll = 0;
  ALL_DAYS.forEach(day => {
    const blocks = makeBlocks(day);
    totalDone += blocks.filter(b => isChecked(day, b.id)).length;
    totalAll  += blocks.length;
  });
  const pct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;
  document.getElementById('total-bar').style.width = pct + '%';
  document.getElementById('total-label').textContent = `${totalDone} / ${totalAll} blocks`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadState().then(() => render());
</script>
</body>
</html>
